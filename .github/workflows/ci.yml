name: ContFast CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: contfast_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm cache directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate TypeScript Types
        run: pnpm exec tsc --noEmit

      - name: Run ESLint
        run: pnpm run lint

      - name: Run Unit Tests
        env:
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/contfast_test
          REDIS_URL: redis://localhost:6379
          CERTIFICATE_ENCRYPTION_KEY: ${{ secrets.CERTIFICATE_ENCRYPTION_KEY || 'test-encryption-key-32-chars-long-here' }}
        run: pnpm exec tsx src/tests/payroll.test.ts

      - name: Build Next.js Production App
        env:
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/contfast_test
          REDIS_URL: redis://localhost:6379
          CERTIFICATE_ENCRYPTION_KEY: ${{ secrets.CERTIFICATE_ENCRYPTION_KEY || 'test-encryption-key-32-chars-long-here' }}
        run: pnpm run build
